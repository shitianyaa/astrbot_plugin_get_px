name: astrbot_plugin_get_px
display_name: 画境拾珍
short_desc: 按标签搜索 Pixiv 作品并发送图片，支持排行榜、详情查询、每日签到和图片历史
desc: 通过标签搜索 Pixiv 插画并发送图片。支持多种排行榜（日/周/月/男性向/女性向等）、R18 过滤、作品详情查看、通过作品ID下载图片、每日签到、WebUI 图片历史、请求频率限制、代理配置、发送重试机制。
version: 2.6.0
author: Sham1k0
repo: https://github.com/shitianyaa/astrbot_plugin_get_px
dependencies:
  - pixivpy-async
  - aiohttp
  - Pillow
support_platforms:
  - aiocqhttp
