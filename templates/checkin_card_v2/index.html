<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>签到卡片 V2 初始模板</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="stage">
    <article class="checkin-card" aria-label="签到卡片 V2 初始模板">
      <div class="artwork-layer" aria-hidden="true">
        <i class="sun-disc"></i>
        <i class="paper-wing paper-wing-one"></i>
        <i class="paper-wing paper-wing-two"></i>
        <i class="grain"></i>
      </div>
      <div class="readability-layer" aria-hidden="true"></div>

      <header class="card-header">
        <div class="heading-copy">
          <p class="date">2026-07-11 <span></span> 星期六</p>
          <h1>今日签到</h1>
        </div>
        <div class="badges" aria-label="今日状态">
          <span class="badge badge-event">夏日相遇</span>
          <span class="badge">连续 5 天</span>
        </div>
      </header>

      <section class="identity">
        <div class="avatar" aria-hidden="true">S</div>
        <div class="identity-copy">
          <strong>Sham1k0</strong>
          <span>称号 · 初次相遇</span>
        </div>
      </section>

      <section class="greeting">
        <p class="eyebrow">NEKO'S DAILY NOTE · 011</p>
        <blockquote>
          今天也有好好见面。<br />
          这张画，就当作我们共同留下的回忆。
        </blockquote>
        <p class="signature">— neko</p>
      </section>

      <section class="rewards" aria-label="今日收获">
        <div class="reward-item">
          <span>金币</span>
          <strong><small>+</small>100</strong>
        </div>
        <div class="reward-item">
          <span>好感度</span>
          <strong><small>+</small>1.00</strong>
        </div>
        <div class="reward-item">
          <span>连续签到</span>
          <strong>5<small> 天</small></strong>
        </div>
      </section>

      <section class="growth">
        <div class="growth-copy">
          <div class="growth-row">
            <span>好感度 66.60 · 亲近</span>
            <strong>距离“信赖”还需 3.40</strong>
          </div>
          <div class="progress" aria-label="好感度进度 83%"><i style="width: 83%"></i></div>
        </div>
        <div class="milestone">
          <span>下一纪念</span>
          <strong>累计签到 30 天</strong>
          <small>还差 18 天 · 金币 888</small>
        </div>
      </section>

      <footer class="artwork-credit">
        <span>今日作品</span>
        <strong>Blue Sky</strong>
        <i>/</i>
        <span>Someone · Pixiv 445566</span>
      </footer>

      <div class="folio" aria-hidden="true">MEMORY<br />011</div>
    </article>
  </main>
</body>
</html>
